<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<div th:fragment="content" class="py-4">

  <!-- Header -->
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4">
    <div>
      <h1 class="h3 mb-1">Historial de Pagos</h1>
      <p class="text-muted mb-0">Visualizá las solicitudes de pago y procesá las cuotas de los socios.</p>
    </div>
    <!--<div class="mt-3 mt-md-0">
      <a class="btn btn-outline-secondary" th:href="@{/admin/portal}">
        <i class="bi bi-arrow-left me-1"></i>Volver al portal
      </a>
    </div>-->
  </div>

  <!-- Filtros -->
  <form th:action="@{/admin/pagos}" method="get" class="mb-4 row g-2 align-items-end">
    <div class="col-md-3">
      <label for="numeroSocio" class="form-label">Socio:</label>
      <input type="text" class="form-control form-control-sm" id="numeroSocio" name="numeroSocio"
             th:value="${numeroSocio}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Estado:</label>
      <select class="form-select form-select-sm" name="estado">
        <option value="">Seleccionar Estado</option>
        <option value="PROCESANDO">PROCESANDO</option>
        <option value="PAGADA">PAGADA</option>
        <option value="ADEUDADA">ADEUDADA</option>
      </select>
    </div>

    <div class="col-md-3 d-grid">
      <button type="submit" class="btn btn-primary btn-sm mt-1">Buscar</button>
    </div>
    <div class="col-md-3 d-grid">
      <a th:href="@{/admin/pagos}" class="btn btn-secondary btn-sm mt-1">Ver todos</a>
    </div>
  </form>

  <!-- Tabla de cuotas -->
  <form th:action="@{/admin/pagos/pagar}" method="post">
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead class="table-light">
          <tr>
            <th></th>
            <th>Nro Socio</th>
			<th>Nombre</th>
            <th>Mes-Año</th>
            <th>Fecha vencimiento</th>
            <th>Valor</th>
            <th>Estado</th>
            <th>Modo de pago</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cuotaAdmin : ${listaCuotas}">
            <td>
              <input type="checkbox" name="idCuotas" class="cuotaCheck"  
                     th:value="${cuotaAdmin.cuota.id}" 
                     th:disabled="${cuotaAdmin.cuota.estado.name() == 'PAGADA' or cuotaAdmin.cuota.estado.name() == 'ADEUDADA'}"
                     th:data-valor="${cuotaAdmin.cuota.valorCuota.valorCuota}" />
            </td>
            <td th:text="${cuotaAdmin.cuota.socio.numeroSocio}"></td>
			<td th:text="${cuotaAdmin.cuota.socio.nombre + ' ' + cuotaAdmin.cuota.socio.apellido}"></td>
            <td th:text="${cuotaAdmin.cuota.mes} + '-' + ${cuotaAdmin.cuota.anio}"></td>
            <td th:text="${cuotaAdmin.cuota.fechaVencimiento}"></td>
            <td th:text="${cuotaAdmin.cuota.valorCuota.valorCuota}"></td>
            <td>
              <label th:classappend="${cuotaAdmin.cuota.estado.name() == 'PAGADA' ? 'badge text-bg-success' 
                                      : cuotaAdmin.cuota.estado.name() == 'PROCESANDO' ? 'badge text-bg-primary' 
                                      : 'badge text-bg-danger'}"
                     th:text="${cuotaAdmin.cuota.estado.name()}"></label>
            </td>
            <td>
              <span th:text="${cuotaAdmin.tipoPago != null ? cuotaAdmin.tipoPago : 'N/A'}"></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

	<!-- Contenedor de subtotal + botón -->
	<div class="d-flex justify-content-between align-items-center mt-3 p-3 border rounded shadow-sm" style="background-color: #f8f9fa;">
	  <div>
	    <h6 class="mb-0 text-primary">Total seleccionado:</h6>
	    <p class="mb-0 fw-bold text-primary" id="subtotal">0.00</p>
	  </div>
	  <button type="submit" class="btn btn-success">Pagar cuotas seleccionadas</button>
	</div>


  </form>

  <script>
    const checkboxes = document.querySelectorAll('.cuotaCheck');
    const subtotalSpan = document.getElementById('subtotal');

    function actualizarSubtotal() {
        let subtotal = 0;
        checkboxes.forEach(cb => {
            if(cb.checked) {
                subtotal += parseFloat(cb.dataset.valor);
            }
        });
        subtotalSpan.textContent = subtotal.toFixed(2);
    }

    checkboxes.forEach(cb => cb.addEventListener('change', actualizarSubtotal));
  </script>

</html>
