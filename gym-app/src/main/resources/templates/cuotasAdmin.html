	  <div class="navbar-menu-wrapper d-flex align-items-top">

	      <!-- Contenido principal -->
  <div class="container-fluid page-body-wrapper">
    <sidebar th:replace="fragments/sidebar :: miSidebar"></sidebar>

    <div class="main-panel">
      <div class="content-wrapper">

        <!-- Bloque de filtros -->
        <div class="card mb-3">
          <div class="card-body">
            <form th:action="@{/admin/pagos}" method="get" class="row g-3 align-items-end">
              
              <div class="col-auto">
                <label for="numeroSocio" class="form-label mb-0">Socio:</label>
                <input type="text" class="form-control form-control-sm" id="numeroSocio" name="numeroSocio"
                       th:value="${numeroSocio}">
              </div>
              
              <div class="col-auto">
                <label class="form-label mb-0">Estado:</label>
                <select class="form-control form-control-sm" name="estado">
                  <option value="">Seleccionar Estado</option>
                  <option value="PROCESANDO">PROCESANDO</option>
                  <option value="PAGADA">PAGADA</option>
                  <option value="ADEUDADA">ADEUDADA</option>
                </select>
              </div>
              <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">Buscar</button>
                <a th:href="@{/admin/pagos}" class="btn btn-secondary btn-sm">Ver todos</a>
              </div>
            </form>
          </div>
        </div>
    <!-- partial -->
    <!-- Bloque de tabla de cuotas -->
        <div class="card">
          <div class="card-body">
            <h4 class="card-title">Cuotas</h4>
            <form th:action="@{/admin/pagos/pagar}" method="post">
              <div class="table-responsive">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th></th>
                      <th>Socio</th>
                      <th>Mes-Año</th>
                      <th>Fecha vencimiento</th>
                      <th>Valor</th>
                      <th>Estado</th>
                      <th>Modo de pago</th>
                      
                    </tr>
                  </thead>
                  <tbody>
                  
                  <tr th:each="cuotaAdmin : ${listaCuotas}">
					  <td>
					    <input type="checkbox" name="idCuotas" class="cuotaCheck"  
					           th:value="${cuotaAdmin.cuota.id}" 
					           th:disabled="${cuotaAdmin.cuota.estado.name() == 'PAGADA' or cuotaAdmin.cuota.estado.name() == 'ADEUDADA'}"
					           th:data-valor="${cuotaAdmin.cuota.valorCuota.valorCuota}" />
					  </td>
					  <td th:text="${cuotaAdmin.cuota.socio.numeroSocio}"></td>
					  <td th:text="${cuotaAdmin.cuota.mes} + '-' + ${cuotaAdmin.cuota.anio}"></td>
					  <td th:text="${cuotaAdmin.cuota.fechaVencimiento}"></td>
					  <td th:text="${cuotaAdmin.cuota.valorCuota.valorCuota}"></td>
					  <td>
					    <label th:classappend="${cuotaAdmin.cuota.estado.name() == 'PAGADA' ? 'badge badge-success' 
					                            : cuotaAdmin.cuota.estado.name() == 'PROCESANDO' ? 'badge badge-primary' 
					                            : 'badge badge-danger'}"
					           th:text="${cuotaAdmin.cuota.estado.name()}"></label>
					  </td>
					  <td>
					    <span th:text="${cuotaAdmin.tipoPago != null ? cuotaAdmin.tipoPago : 'N/A'}"></span>
					  </td>
					</tr>

                  </tbody>
                </table>
              </div>

		      <button type="submit" class="btn btn-success mt-2">Pagar cuotas seleccionadas</button>
             </form>

              
			
          </div>
        </div>

      </div> <!-- content-wrapper -->
    </div> <!-- main-panel -->
  </div> <!-- page-body-wrapper -->
</div> <!-- container-scroller -->
		
            
        <!-- content-wrapper ends -->

            <span class="float-none float-sm-right d-block mt-1 mt-sm-0 text-center">Copyright © 2021. All rights reserved.</span>
          </div>

  <script th:src="@{/js/template.js}"></script>
  <script th:src="@{/js/settings.js}"></script>
  <script th:src="@{/js/todolist.js}"></script>
  <!-- endinject -->
  <!-- Custom js for this page-->
  <!-- End custom js for this page-->
  <script>
	  const checkboxes = document.querySelectorAll('.cuotaCheck');
	  const subtotalSpan = document.getElementById('subtotal');
	
	  function actualizarSubtotal() {
	      let subtotal = 0;
	      checkboxes.forEach(cb => {
	          if(cb.checked) {
	              subtotal += parseFloat(cb.dataset.valor);
	          }
	      });
	      subtotalSpan.textContent = subtotal.toFixed(2);
	  }
	
	  checkboxes.forEach(cb => cb.addEventListener('change', actualizarSubtotal));
  </script>
  
  
	  
  
</body>
